<div class="signup-container">
  <div class="signup-box">
    <h2 class="text-center text-warning">Sign Up</h2>
    <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
      <div class="form-group">
        <label for="name" class="text-warning">Name</label>
        <input type="text" class="form-control" id="name" [(ngModel)]="user.name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email" class="text-warning">Email</label>
        <input type="email" class="form-control" id="email" [(ngModel)]="user.email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password" class="text-warning">Password</label>
        <input type="password" class="form-control" id="password" [(ngModel)]="user.password" name="password" required>
      </div>
      <button type="submit" class="btn btn-warning btn-block" [disabled]="!signupForm.form.valid">Sign Up</button>
    </form>
    <p class="mt-3 text-center text-warning">
      Already have an account? <a routerLink="/login" class="text-warning">Login here</a>
    </p>
  </div>
</div>
