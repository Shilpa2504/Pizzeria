<div class="container section-padding">
  <h2 class="mb-4">My Profile</h2>

  <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="card mx-auto" style="max-width: 500px;" *ngIf="user">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="fas fa-user-circle fa-5x text-muted"></i>
        <h4 class="mt-2">{{ user.name }}</h4>
        <p class="text-muted">{{ user.email }}</p>
      </div>

      <div *ngIf="!isEditing">
        <div class="mb-3">
          <label class="text-muted small">Name</label>
          <p class="fw-bold">{{ user.name }}</p>
        </div>
        <div class="mb-3">
          <label class="text-muted small">Email</label>
          <p class="fw-bold">{{ user.email }}</p>
        </div>
        <div class="mb-3" *ngIf="user.phone">
          <label class="text-muted small">Phone</label>
          <p class="fw-bold">{{ user.phone }}</p>
        </div>
        <button class="btn btn-primary w-100" (click)="toggleEdit()">
          <i class="fas fa-edit"></i> Edit Profile
        </button>
      </div>

      <form *ngIf="isEditing" (ngSubmit)="saveProfile()">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" [(ngModel)]="editingUser.name" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="editingUser.email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" [(ngModel)]="editingUser.phone" name="phone">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="isLoading">
            <i class="fas fa-save"></i> Save
          </button>
          <button type="button" class="btn btn-outline-secondary" (click)="toggleEdit()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
