<div class="container py-5">
  <div class="text-center">
    <div class="mb-3" style="font-size: 4rem;">🎉</div>
    <h1 class="text-success fw-bold">Thank You for Your Order!</h1>
    <h4 class="text-muted mt-2">Your order has been successfully placed.</h4>

    <div class="card border-success mx-auto mt-4" style="max-width: 380px;">
      <div class="card-body">
        <h5 class="card-title text-success mb-3">
          <i class="fas fa-receipt"></i> Order Summary
        </h5>
        <div class="d-flex justify-content-between align-items-center">
          <span class="text-muted">Amount Paid</span>
          <span class="fs-4 fw-bold">{{ totalCost | currency:'INR':'symbol':'1.0-0' }}</span>
        </div>
        <hr>
        <small class="text-muted">(Includes items, 5% tax &amp; delivery)</small>
      </div>
    </div>

    <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">
      <a routerLink="/order-history" class="btn btn-primary">
        <i class="fas fa-history"></i> View Order History
      </a>
      <a routerLink="/orderpizza" class="btn btn-outline-secondary">
        <i class="fas fa-pizza-slice"></i> Order Again
      </a>
    </div>
  </div>
</div>
