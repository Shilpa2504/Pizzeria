<div class="container section-padding">
  <h2 class="mb-4">Order History</h2>

  <div class="text-center py-5" *ngIf="isLoading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="alert alert-info text-center" *ngIf="!isLoading && orders.length === 0">
    <i class="fas fa-history fa-2x mb-2"></i>
    <p>No orders yet. <a routerLink="/orderpizza">Order your first pizza!</a></p>
  </div>

  <div class="card mb-3" *ngFor="let order of orders">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
          <h6 class="mb-1">Order #{{ order._id?.slice(-8) | uppercase }}</h6>
          <small class="text-muted">{{ formatDate(order.createdAt) }}</small>
        </div>
        <span class="badge bg-{{ getStatusClass(order.status) }}">{{ order.status | titlecase }}</span>
      </div>
      <div class="mb-2" *ngFor="let item of order.items">
        <span class="text-muted small">{{ item.name }} x{{ item.quantity }}</span>
        <span class="float-end text-muted small">&#8377;{{ item.price * item.quantity }}</span>
      </div>
      <hr>
      <div class="d-flex justify-content-between fw-bold">
        <span>Total</span>
        <span style="color:#E85D04;">&#8377;{{ order.totalAmount }}</span>
      </div>
    </div>
  </div>
</div>
